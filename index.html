<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CV Builder Prototype</title>
</head>
<body style="margin:0;">
<div id="cv-app">
<style>
  #cv-app{
    --bg:#EFECE4;
    --panel:#FFFFFF;
    --ink:#1C1F26;
    --muted:#6B6F76;
    --line:#DEDAD2;
    --emerald:#2F6F62;
    --amber:#C9883E;
    --navy:#1F2A44;

    font-family:'Inter', system-ui, sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  #cv-app *{ box-sizing:border-box; }

  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Archivo:wght@500;700;800&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&family=IBM+Plex+Mono:wght@400;500&display=swap');

  /* ---------- TOP BAR ---------- */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    padding:14px 22px;
    background:var(--ink);
    color:#fff;
    flex-wrap:wrap;
  }
  .topbar h1{
    font-family:'Archivo', sans-serif;
    font-size:16px;
    font-weight:700;
    margin:0;
    letter-spacing:-0.01em;
  }
  .topbar .sub{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    color:#A9ADB5;
    margin-top:2px;
  }
  .tpl-switch{
    display:flex;
    gap:6px;
    background:rgba(255,255,255,0.08);
    padding:4px;
    border-radius:8px;
  }
  .tpl-switch button{
    font-family:'Inter',sans-serif;
    font-size:12.5px;
    font-weight:600;
    padding:7px 14px;
    border-radius:6px;
    border:none;
    background:transparent;
    color:#C7C9CD;
    cursor:pointer;
    transition:all .15s ease;
  }
  .tpl-switch button.active{
    background:#fff;
    color:var(--ink);
  }
  .print-btn{
    font-family:'Inter',sans-serif;
    font-size:12.5px;
    font-weight:600;
    padding:9px 16px;
    border-radius:6px;
    border:none;
    background:var(--amber);
    color:#1C1F26;
    cursor:pointer;
  }
  .print-btn:hover{ filter:brightness(1.05); }

  /* ---------- MAIN LAYOUT ---------- */
  .main{
    display:flex;
    flex:1;
    min-height:0;
  }

  .editor-pane{
    width:380px;
    flex-shrink:0;
    background:var(--panel);
    border-right:1px solid var(--line);
    overflow-y:auto;
    padding:18px 18px 60px;
    max-height:calc(100vh - 60px);
  }

  .preview-pane{
    flex:1;
    overflow:auto;
    display:flex;
    justify-content:center;
    padding:28px 16px;
  }

  .field-group{ margin-bottom:18px; }
  .field-group h3{
    font-family:'Archivo',sans-serif;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--emerald);
    margin:0 0 10px;
    padding-bottom:6px;
    border-bottom:1px solid var(--line);
  }

  .row{ display:flex; gap:8px; margin-bottom:8px; }
  .row > *{ flex:1; }

  label{
    display:block;
    font-size:11px;
    color:var(--muted);
    margin-bottom:3px;
  }

  input[type=text], textarea{
    width:100%;
    font-family:'Inter',sans-serif;
    font-size:13px;
    padding:7px 9px;
    border:1px solid var(--line);
    border-radius:5px;
    background:#FBFAF8;
    color:var(--ink);
    margin-bottom:8px;
    resize:vertical;
  }
  input[type=text]:focus, textarea:focus{
    outline:2px solid var(--emerald);
    outline-offset:1px;
  }
  textarea{ min-height:54px; line-height:1.5; }

  .entry-card{
    border:1px solid var(--line);
    border-radius:7px;
    padding:11px;
    margin-bottom:10px;
    background:#FAF9F6;
    position:relative;
  }
  .entry-card .remove-btn{
    position:absolute;
    top:8px; right:8px;
    background:none;
    border:none;
    color:var(--muted);
    font-size:12px;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .entry-card .remove-btn:hover{ color:#B5453B; }

  .add-btn{
    width:100%;
    padding:8px;
    border:1px dashed var(--line);
    border-radius:6px;
    background:none;
    color:var(--emerald);
    font-family:'Inter',sans-serif;
    font-size:12.5px;
    font-weight:600;
    cursor:pointer;
  }
  .add-btn:hover{ background:#F1F6F4; }

  .hint{
    font-size:10.5px;
    color:var(--muted);
    margin:-4px 0 8px;
  }

  /* ---------- PREVIEW SHEET ---------- */
  .sheet{
    width:210mm;
    min-height:297mm;
    background:#fff;
    box-shadow:0 8px 30px rgba(0,0,0,0.18);
    padding:16mm 16mm 14mm;
    flex-shrink:0;
  }

  /* === Dossier template === */
  .sheet.tpl-dossier{ font-family:'Source Serif 4', serif; color:var(--ink); }
  .tpl-dossier .d-header{ display:flex; justify-content:space-between; align-items:flex-end; gap:20px; padding-bottom:12px; }
  .tpl-dossier .d-name{ font-family:'Archivo',sans-serif; font-weight:800; font-size:32px; margin:0; line-height:1; letter-spacing:-0.01em; }
  .tpl-dossier .d-role{ font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.04em; color:var(--emerald); text-transform:uppercase; margin-top:7px; }
  .tpl-dossier .d-rule{ height:3px; background:var(--ink); width:130px; position:relative; margin-bottom:10px; }
  .tpl-dossier .d-rule::after{ content:""; position:absolute; right:-34px; top:0; width:34px; height:3px; background:var(--amber); }
  .tpl-dossier .d-photo{ width:68px; height:68px; border-radius:6px; background:repeating-linear-gradient(45deg,#ECE9E1,#ECE9E1 6px,#E2DED4 6px,#E2DED4 12px); border:1px solid var(--line); flex-shrink:0; }
  .tpl-dossier .d-contact{ display:flex; flex-wrap:wrap; gap:16px; font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--muted); padding:8px 0 16px; border-bottom:1px solid var(--line); }
  .tpl-dossier .d-contact b{ color:var(--ink); font-weight:500; }
  .tpl-dossier .d-grid{ display:grid; grid-template-columns:60mm 1fr; gap:0 13mm; margin-top:16px; }
  .tpl-dossier .d-colL{ border-right:1px solid var(--line); padding-right:13mm; }
  .tpl-dossier .d-section{ margin-bottom:18px; }
  .tpl-dossier .d-label{ font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--emerald); margin:0 0 8px; display:flex; align-items:center; gap:6px; }
  .tpl-dossier .d-label::after{ content:""; flex:1; height:1px; background:var(--line); }
  .tpl-dossier .d-text{ font-size:12px; line-height:1.6; margin:0; }
  .tpl-dossier .d-tags{ display:flex; flex-wrap:wrap; gap:5px; }
  .tpl-dossier .d-tag{ background:#EFEEE8; border:1px solid var(--line); font-family:'IBM Plex Mono',monospace; font-size:9.5px; padding:3px 8px; border-radius:3px; }
  .tpl-dossier .d-timeline{ position:relative; padding-left:16px; }
  .tpl-dossier .d-timeline::before{ content:""; position:absolute; left:3px; top:4px; bottom:4px; width:1px; background:var(--line); }
  .tpl-dossier .d-titem{ position:relative; margin-bottom:14px; }
  .tpl-dossier .d-titem::before{ content:""; position:absolute; left:-16px; top:4px; width:6px; height:6px; border-radius:50%; background:#fff; border:2px solid var(--emerald); }
  .tpl-dossier .d-ttop{ display:flex; justify-content:space-between; gap:8px; align-items:baseline; }
  .tpl-dossier .d-trole{ font-family:'Archivo',sans-serif; font-weight:700; font-size:13px; }
  .tpl-dossier .d-tcompany{ font-family:'IBM Plex Mono',monospace; font-size:9.5px; color:var(--muted); }
  .tpl-dossier .d-tdate{ font-family:'IBM Plex Mono',monospace; font-size:9.5px; color:var(--amber); white-space:nowrap; }
  .tpl-dossier .d-tdesc{ font-size:11.5px; line-height:1.55; margin:5px 0 0; padding:0; list-style:none; }
  .tpl-dossier .d-tdesc li{ position:relative; padding-left:12px; margin-bottom:2px; }
  .tpl-dossier .d-tdesc li::before{ content:"–"; position:absolute; left:0; color:var(--muted); }
  .tpl-dossier .d-lang{ display:flex; justify-content:space-between; font-size:11.5px; margin-bottom:5px; }
  .tpl-dossier .d-lang span:last-child{ font-family:'IBM Plex Mono',monospace; font-size:9.5px; color:var(--muted); }

  /* === Klasik template === */
  .sheet.tpl-klasik{ font-family:'Georgia','Source Serif 4',serif; color:var(--navy); }
  .tpl-klasik .k-header{ text-align:center; padding-bottom:14px; border-bottom:2.5px solid var(--navy); margin-bottom:16px; }
  .tpl-klasik .k-name{ font-size:28px; font-weight:700; margin:0; letter-spacing:0.03em; text-transform:uppercase; }
  .tpl-klasik .k-role{ font-family:'Inter',sans-serif; font-size:12px; color:var(--muted); letter-spacing:0.06em; margin-top:6px; text-transform:uppercase; }
  .tpl-klasik .k-contact{ font-family:'Inter',sans-serif; font-size:10.5px; color:var(--muted); margin-top:8px; }
  .tpl-klasik .k-contact span:not(:last-child)::after{ content:"  ·  "; }
  .tpl-klasik .k-section{ margin-bottom:16px; }
  .tpl-klasik .k-label{ font-family:'Inter',sans-serif; font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--navy); margin:0 0 8px; }
  .tpl-klasik .k-text{ font-size:12.5px; line-height:1.65; margin:0; }
  .tpl-klasik .k-row2{ display:flex; justify-content:space-between; gap:10px; }
  .tpl-klasik .k-item{ margin-bottom:11px; }
  .tpl-klasik .k-role2{ font-weight:700; font-size:13px; }
  .tpl-klasik .k-company{ font-style:italic; font-size:12px; }
  .tpl-klasik .k-date{ font-family:'Inter',sans-serif; font-size:10.5px; color:var(--muted); white-space:nowrap; }
  .tpl-klasik .k-desc{ font-size:12px; line-height:1.6; margin:4px 0 0 18px; padding:0; }
  .tpl-klasik .k-desc li{ margin-bottom:2px; }
  .tpl-klasik .k-tags{ font-family:'Inter',sans-serif; font-size:12px; line-height:1.7; }
  .tpl-klasik .k-skillsep{ color:var(--muted); }

  @media print{
    body *{ visibility:hidden; }
    #cv-app, #cv-app *{ visibility:visible; }
    .topbar, .editor-pane{ display:none !important; }
    .preview-pane{ padding:0; }
    .sheet{ box-shadow:none; margin:0; }
    @page{ size:A4; margin:0; }
  }

  @media (max-width:860px){
    .main{ flex-direction:column; }
    .editor-pane{ width:100%; max-height:none; border-right:none; border-bottom:1px solid var(--line); }
    .sheet{ width:100%; min-height:auto; }
  }
</style>

<div class="topbar">
  <div>
    <h1>CV Builder</h1>
    <div class="sub">isi data sekali, pakai berkali-kali</div>
  </div>
  <div class="tpl-switch">
    <button type="button" id="btn-tpl-dossier" class="active">Dossier</button>
    <button type="button" id="btn-tpl-klasik">Klasik</button>
  </div>
  <button type="button" class="print-btn" id="btn-print">Cetak / Simpan PDF</button>
</div>

<div class="main">
  <div class="editor-pane">

    <div class="field-group">
      <h3>Data Diri</h3>
      <input type="text" id="f-name" placeholder="Nama lengkap" value="Andi Pratama">
      <input type="text" id="f-role" placeholder="Posisi / jabatan yang dilamar" value="Marketing & Brand Specialist">
      <div class="row">
        <input type="text" id="f-email" placeholder="Email" value="andi.pratama@email.com">
        <input type="text" id="f-phone" placeholder="No. Telepon" value="0812-3456-7890">
      </div>
      <div class="row">
        <input type="text" id="f-location" placeholder="Domisili" value="Jakarta Selatan">
        <input type="text" id="f-linkedin" placeholder="LinkedIn" value="/in/andipratama">
      </div>
    </div>

    <div class="field-group">
      <h3>Profil Singkat</h3>
      <textarea id="f-summary">Marketing specialist dengan 4 tahun pengalaman mengelola kampanye digital untuk brand FMCG. Terbukti meningkatkan engagement rate hingga 38% dalam satu tahun terakhir.</textarea>
    </div>

    <div class="field-group">
      <h3>Keahlian</h3>
      <div class="hint">pisahkan dengan koma</div>
      <textarea id="f-skills">Meta Ads, Google Analytics, Content Strategy, Canva, SEO Dasar, Copywriting</textarea>
    </div>

    <div class="field-group">
      <h3>Bahasa</h3>
      <div class="hint">satu baris satu bahasa, format: Bahasa - Level</div>
      <textarea id="f-lang">Bahasa Indonesia - Native
Bahasa Inggris - Fluent</textarea>
    </div>

    <div class="field-group">
      <h3>Pengalaman Kerja</h3>
      <div id="exp-list"></div>
      <button type="button" class="add-btn" id="add-exp">+ Tambah Pengalaman</button>
    </div>

    <div class="field-group">
      <h3>Pendidikan</h3>
      <div id="edu-list"></div>
      <button type="button" class="add-btn" id="add-edu">+ Tambah Pendidikan</button>
    </div>

  </div>

  <div class="preview-pane">
    <div class="sheet tpl-dossier" id="sheet"></div>
  </div>
</div>
</div>

<script>
(function(){
  const root = document.getElementById('cv-app');

  function expRowHTML(role, company, start, end, bullets){
    return `<div class="entry-card exp-card">
      <button type="button" class="remove-btn">✕ hapus</button>
      <input type="text" class="exp-role" placeholder="Posisi" value="${role}">
      <input type="text" class="exp-company" placeholder="Nama perusahaan" value="${company}">
      <div class="row">
        <input type="text" class="exp-start" placeholder="Mulai (cth 2022)" value="${start}">
        <input type="text" class="exp-end" placeholder="Selesai (cth Sekarang)" value="${end}">
      </div>
      <textarea class="exp-bullets" placeholder="Satu baris satu poin pencapaian">${bullets}</textarea>
    </div>`;
  }

  function eduRowHTML(degree, school, start, end, note){
    return `<div class="entry-card edu-card">
      <button type="button" class="remove-btn">✕ hapus</button>
      <input type="text" class="edu-degree" placeholder="Jenjang & jurusan" value="${degree}">
      <input type="text" class="edu-school" placeholder="Nama institusi" value="${school}">
      <div class="row">
        <input type="text" class="edu-start" placeholder="Mulai" value="${start}">
        <input type="text" class="edu-end" placeholder="Selesai" value="${end}">
      </div>
      <input type="text" class="edu-note" placeholder="IPK / catatan (opsional)" value="${note}">
    </div>`;
  }

  const expList = root.querySelector('#exp-list');
  const eduList = root.querySelector('#edu-list');

  expList.insertAdjacentHTML('beforeend', expRowHTML(
    'Marketing Specialist','PT Nusantara Konsumer Indonesia','2022','Sekarang',
    'Mengelola strategi konten & iklan untuk 3 lini produk\nMeningkatkan engagement rate Instagram dari 2,1% ke 5,8%\nMemimpin tim 3 orang'
  ));
  expList.insertAdjacentHTML('beforeend', expRowHTML(
    'Digital Marketing Associate','CV Kreasi Mediatama','2020','2022',
    'Menjalankan kampanye Meta Ads & Google Ads untuk 6 klien UMKM\nMenyusun laporan performa bulanan'
  ));

  eduList.insertAdjacentHTML('beforeend', eduRowHTML(
    'S1 Ilmu Komunikasi','Universitas Indonesia','2016','2020','IPK 3.62 / 4.00'
  ));

  root.querySelector('#add-exp').addEventListener('click', () => {
    expList.insertAdjacentHTML('beforeend', expRowHTML('','','','',''));
    render();
  });
  root.querySelector('#add-edu').addEventListener('click', () => {
    eduList.insertAdjacentHTML('beforeend', eduRowHTML('','','','',''));
    render();
  });

  root.addEventListener('click', (e) => {
    if(e.target.classList.contains('remove-btn')){
      e.target.closest('.entry-card').remove();
      render();
    }
  });

  root.addEventListener('input', render);

  let currentTpl = 'dossier';
  root.querySelector('#btn-tpl-dossier').addEventListener('click', () => setTpl('dossier'));
  root.querySelector('#btn-tpl-klasik').addEventListener('click', () => setTpl('klasik'));
  function setTpl(t){
    currentTpl = t;
    root.querySelector('#btn-tpl-dossier').classList.toggle('active', t==='dossier');
    root.querySelector('#btn-tpl-klasik').classList.toggle('active', t==='klasik');
    render();
  }

  root.querySelector('#btn-print').addEventListener('click', () => window.print());

  function val(id){ return root.querySelector(id).value.trim(); }

  function bulletsToLis(text, className){
    return text.split('\n').map(s=>s.trim()).filter(Boolean)
      .map(s=>`<li class="${className||''}">${s}</li>`).join('');
  }

  function collect(){
    const skills = val('#f-skills').split(',').map(s=>s.trim()).filter(Boolean);
    const langs = val('#f-lang').split('\n').map(s=>s.trim()).filter(Boolean).map(line=>{
      const [name, level] = line.split(' - ');
      return { name: (name||'').trim(), level: (level||'').trim() };
    });
    const exps = [...root.querySelectorAll('.exp-card')].map(card => ({
      role: card.querySelector('.exp-role').value.trim(),
      company: card.querySelector('.exp-company').value.trim(),
      start: card.querySelector('.exp-start').value.trim(),
      end: card.querySelector('.exp-end').value.trim(),
      bullets: card.querySelector('.exp-bullets').value
    }));
    const edus = [...root.querySelectorAll('.edu-card')].map(card => ({
      degree: card.querySelector('.edu-degree').value.trim(),
      school: card.querySelector('.edu-school').value.trim(),
      start: card.querySelector('.edu-start').value.trim(),
      end: card.querySelector('.edu-end').value.trim(),
      note: card.querySelector('.edu-note').value.trim()
    }));
    return {
      name: val('#f-name'), role: val('#f-role'), email: val('#f-email'),
      phone: val('#f-phone'), location: val('#f-location'), linkedin: val('#f-linkedin'),
      summary: val('#f-summary'), skills, langs, exps, edus
    };
  }

  function renderDossier(d){
    return `
      <div class="d-header">
        <div>
          <div class="d-rule"></div>
          <h1 class="d-name">${d.name || 'Nama Lengkap'}</h1>
          <div class="d-role">${d.role || 'Posisi yang dilamar'}</div>
        </div>
        <div class="d-photo"></div>
      </div>
      <div class="d-contact">
        ${d.email ? `<span><b>Email</b> ${d.email}</span>`:''}
        ${d.phone ? `<span><b>Telp</b> ${d.phone}</span>`:''}
        ${d.location ? `<span><b>Domisili</b> ${d.location}</span>`:''}
        ${d.linkedin ? `<span><b>LinkedIn</b> ${d.linkedin}</span>`:''}
      </div>
      <div class="d-grid">
        <div class="d-colL">
          <div class="d-section">
            <p class="d-label">Profil</p>
            <p class="d-text">${d.summary}</p>
          </div>
          <div class="d-section">
            <p class="d-label">Keahlian</p>
            <div class="d-tags">${d.skills.map(s=>`<span class="d-tag">${s}</span>`).join('')}</div>
          </div>
          <div class="d-section">
            <p class="d-label">Bahasa</p>
            ${d.langs.map(l=>`<div class="d-lang"><span>${l.name}</span><span>${l.level}</span></div>`).join('')}
          </div>
        </div>
        <div class="d-colR">
          <div class="d-section">
            <p class="d-label">Pengalaman Kerja</p>
            <div class="d-timeline">
              ${d.exps.map(x=>`
                <div class="d-titem">
                  <div class="d-ttop">
                    <div><span class="d-trole">${x.role}</span><br><span class="d-tcompany">${x.company}</span></div>
                    <span class="d-tdate">${x.start} — ${x.end}</span>
                  </div>
                  <ul class="d-tdesc">${bulletsToLis(x.bullets)}</ul>
                </div>`).join('')}
            </div>
          </div>
          <div class="d-section">
            <p class="d-label">Pendidikan</p>
            <div class="d-timeline">
              ${d.edus.map(x=>`
                <div class="d-titem">
                  <div class="d-ttop">
                    <div><span class="d-trole">${x.degree}</span><br><span class="d-tcompany">${x.school}</span></div>
                    <span class="d-tdate">${x.start} — ${x.end}</span>
                  </div>
                  ${x.note ? `<p class="d-text" style="margin-top:3px;font-size:11px;">${x.note}</p>`:''}
                </div>`).join('')}
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderKlasik(d){
    return `
      <div class="k-header">
        <h1 class="k-name">${d.name || 'Nama Lengkap'}</h1>
        <div class="k-role">${d.role || 'Posisi yang dilamar'}</div>
        <div class="k-contact">
          ${[d.email, d.phone, d.location, d.linkedin].filter(Boolean).map(c=>`<span>${c}</span>`).join('')}
        </div>
      </div>
      <div class="k-section">
        <p class="k-label">Ringkasan Profil</p>
        <p class="k-text">${d.summary}</p>
      </div>
      <div class="k-section">
        <p class="k-label">Pengalaman Kerja</p>
        ${d.exps.map(x=>`
          <div class="k-item">
            <div class="k-row2">
              <span class="k-role2">${x.role} <span class="k-skillsep">—</span> <span class="k-company">${x.company}</span></span>
              <span class="k-date">${x.start} – ${x.end}</span>
            </div>
            <ul class="k-desc">${bulletsToLis(x.bullets)}</ul>
          </div>`).join('')}
      </div>
      <div class="k-section">
        <p class="k-label">Pendidikan</p>
        ${d.edus.map(x=>`
          <div class="k-item">
            <div class="k-row2">
              <span class="k-role2">${x.degree}</span>
              <span class="k-date">${x.start} – ${x.end}</span>
            </div>
            <div class="k-company">${x.school}${x.note ? ' · '+x.note : ''}</div>
          </div>`).join('')}
      </div>
      <div class="k-section">
        <p class="k-label">Keahlian &amp; Bahasa</p>
        <p class="k-tags">${d.skills.join(' <span class="k-skillsep">·</span> ')}</p>
        <p class="k-tags" style="margin-top:6px;">${d.langs.map(l=>l.name+' ('+l.level+')').join(' <span class="k-skillsep">·</span> ')}</p>
      </div>
    `;
  }

  function render(){
    const d = collect();
    const sheet = root.querySelector('#sheet');
    sheet.className = 'sheet ' + (currentTpl === 'dossier' ? 'tpl-dossier' : 'tpl-klasik');
    sheet.innerHTML = currentTpl === 'dossier' ? renderDossier(d) : renderKlasik(d);
  }

  render();
})();
</script>

</body>
</html>
